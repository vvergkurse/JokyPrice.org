<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JokyPrice — Minecraft Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="jokyprice.css">
</head>
<body>
    <!-- ШАПКА -->
    <div class="top-header">
        <button onclick="window.location.href='index.html'" class="home-btn">🛍 JokyPrice</button>
    </div>

    <!-- ГЕРОЯ СЕКЦИЯ -->
    <div class="hero">
        <div class="hero-badge">
            <div class="hero-badge-dot"></div>
            Сервис доставки товара по серверу Sakeva
        </div>
        <p>Плати Арами → Получай вещи</p>
    </div>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <div class="main-container">
        <div class="products-section">
            <div class="filter-container">
                <input type="text" id="filterInput" class="filter-input" placeholder="🔍 Поиск товара...">
            </div>
            
            <div id="products"></div>
        </div>

        <!-- КОРЗИНА -->
        <div id="cart">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3>🛒 Корзина <span id="cart-count">0</span></h3>
                <button onclick="clearCart()" style="color:#666666; background:none; border:none; cursor:pointer; font-size:14px; font-weight:600;">Очистить</button>
            </div>
            <div id="cart-list"></div>
            <div class="total-section">
                <div class="total-flex">
                    <span class="total-label">Итого</span>
                    <span id="total-price">0 ₽</span>
                </div>
                <button onclick="openModal()" class="order-btn">Оформить заказ</button>
            </div>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО -->
    <div id="modal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
                <h3>Оформление заказа</h3>
                <button onclick="closeModal()" class="close-btn">×</button>
            </div>
            <form id="order-form" onsubmit="submitOrder(event)">
                <label>Никнейм в Minecraft</label>
                <input type="text" id="nick" required placeholder="StevePro">
                
                <label style="margin-top:16px;">Скриншот АРОВ (обязательно)</label>
                <input type="file" id="screenshot" accept="image/*" required>
                
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:16px;">
                    <div>
                        <label>Координаты доставки</label>
                        <input type="text" id="delivery" required placeholder="123 64 -456">
                    </div>
                    <div>
                        <label>Мир ферм/Мир построек</label>
                        <input type="text" id="payout" required placeholder="мир ферм">
                    </div>
                </div>
                
                <label style="margin-top:16px;">Комментарий (не обязательно)</label>
                <textarea id="comment" rows="3" placeholder="Доставить как можно быстрее..."></textarea>
                
                <button type="submit" class="order-btn" style="margin-top:24px;">Отправить заказ в Discord</button>
            </form>
        </div>
    </div>

    <footer>
        JokyPrice © 2026 • 
        <button onclick="adminPanel()" style="background:none;border:none;color:#005BFF;cursor:pointer; font-weight:600;">Админ-панель</button>
        • Защита от спама активна
    
        <div style="margin-top:16px; font-size:13px; color:#666666;">
            Вступай в клан: 
            <a href="https://discord.gg/9vEC9RrdSF" target="_blank">
                https://discord.gg/9vEC9RrdSF
            </a>
        </div>
    </footer>

    <script>
        const products = [
            { 
                id:1, 
                name:"Железные блоки x64", 
                price:100, 
                category:"Строительство", 
                image:"https://ru.minecraft.wiki/images/Железный_блок_JE4_BE3.png?41bce" 
            },
            { 
                id:2, 
                name:"Смолянные блоки x128", 
                price:80, 
                category:"Строительство", 
                image:"https://minecraft.wiki/images/Block_of_Resin_JE1_BE1.png?e9586" 
            },
            { 
                id:3, 
                name:"Проворство III", 
                price:500, 
                category:"Зачарования", 
                image:"https://minecraft.wiki/images/Netherite_Boots_%28item%29_BE1.png?b8363&format=original" 
            },
            { 
                id:4, 
                name:"Книга", 
                price:50, 
                category:"Ресурсы", 
                image:"https://minecraft.wiki/images/Book_JE2_BE2.png?caac6" 
            },
            { 
                id:5, 
                name:"Пластинка", 
                price:75, 
                category:"Ресурсы", 
                image:"https://minecraft.wiki/images/thumb/Music_Disc_13_JE1_BE1.png/64px-Music_Disc_13_JE1_BE1.png?3ad74" 
            },
            { 
                id:6, 
                name:"Кожа", 
                price:60, 
                category:"Ресурсы", 
                image:"https://minecraft.wiki/images/Leather_JE2_BE2.png?10fae" 
            },
            { 
                id:7, 
                name:"Факел Душ", 
                price:150, 
                category:"Ресурсы", 
                image:"https://minecraft.wiki/images/Soul_Torch.gif?49a46" 
            },
            { 
                id:8, 
                name:"Незерит", 
                price:2000, 
                category:"Ресурсы", 
                image:"https://minecraft.wiki/images/Netherite_Ingot_JE1_BE2.png?79364" 
            }
        ];

        let cart = [];

        function filterProducts() {
            const filterValue = document.getElementById('filterInput').value.toLowerCase();
            const container = document.getElementById('products');
            container.innerHTML = '';
            
            const filtered = products.filter(p => 
                p.name.toLowerCase().includes(filterValue) || 
                p.category.toLowerCase().includes(filterValue)
            );
            
            if (filtered.length === 0) {
                container.innerHTML = '<div style="color:#666666; padding:40px; text-align:center;">Товары не найдены</div>';
                return;
            }
            
            filtered.forEach((p, i) => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="product-image">
                        <img src="${p.image}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/300x200/F5F5F5/005BFF?text=${encodeURIComponent(p.name)}'">
                    </div>
                    <div class="product-info">
                        <div class="product-category">${p.category}</div>
                        <h3>${p.name}</h3>
                        <div class="price-row">
                            <span class="price">${p.price}</span>
                            <span class="currency-label">₽</span>
                        </div>
                        <div class="buttons-row">
                            <button type="button" onclick="goToProduct(${i})" class="view-btn">Подробнее</button>
                            <button type="button" onclick="addToCart(${i})" class="add-btn">Добавить</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function goToProduct(index) {
            localStorage.setItem('selectedProduct', index);
            window.location.href = 'product.html';
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('filterInput').addEventListener('keyup', filterProducts);
            filterProducts();
            renderCart();
        });

        function addToCart(i) {
            const product = products[i];
            const existing = cart.find(item => item.id === product.id);
            if (existing) {
                existing.qty++;
            } else {
                cart.push({...product, qty: 1});
            }
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            const totalEl = document.getElementById('total-price');
            const countEl = document.getElementById('cart-count');
            list.innerHTML = '';
            let total = 0;
            
            cart.forEach((item, i) => {
                const itemTotal = item.price * item.qty;
                total += itemTotal;
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `
                    <div class="cart-item-info">
                        <div class="cart-item-name">${item.name}</div>
                        <div class="cart-item-qty">×${item.qty}</div>
                    </div>
                    <div style="display:flex; align-items:center;">
                        <span class="cart-item-price">${itemTotal} ₽</span>
                        <button type="button" onclick="removeFromCart(${i})" class="cart-item-remove">×</button>
                    </div>
                `;
                list.appendChild(div);
            });
            
            totalEl.textContent = total + ' ₽';
            countEl.textContent = cart.length;
        }

        function removeFromCart(i) { 
            cart.splice(i, 1); 
            renderCart(); 
        }

        function clearCart() { 
            if (confirm('Очистить корзину?')) { 
                cart = []; 
                renderCart(); 
            } 
        }

        function openModal() { 
            if (cart.length === 0) return alert('Корзина пуста!'); 
            document.getElementById('modal').style.display = 'flex'; 
        }

        function closeModal() { 
            document.getElementById('modal').style.display = 'none'; 
        }

        async function submitOrder(e) {
            e.preventDefault();

            const nick = document.getElementById('nick').value.trim();
            const delivery = document.getElementById('delivery').value.trim();
            const payout = document.getElementById('payout').value.trim();
            const comment = document.getElementById('comment').value.trim();
            const file = document.getElementById('screenshot').files[0];

            if (nick.length < 4) return alert('Ник должен быть минимум 4 символа!');
            if (!delivery || !payout) return alert('Укажите координаты доставки и выплаты!');
            if (!/^-?\d+\s+-?\d+\s+-?\d+$/.test(delivery) || !/^-?\d+\s+-?\d+\s+-?\d+$/.test(payout)) {
                return alert('Координаты должны состоять из 3 чисел через пробел (можно отрицательные)!');
            }
            if (!file) return alert('Прикрепи скриншот АРОВ!');

            const now = Date.now();
            if (localStorage.getItem('banned') === 'true') return alert('Ваш IP заблокирован за спам.');

            let orders = JSON.parse(localStorage.getItem('orders') || '[]');
            orders = orders.filter(t => now - t < 600000);
            if (orders.length >= 5) {
                localStorage.setItem('banned', 'true');
                return alert('Вы сделали 5 заказов за 10 минут.\nВаш IP заблокирован (защита от спама и ботов).');
            }

            if (localStorage.getItem('lastOrder') && now - localStorage.getItem('lastOrder') < 60000) {
                return alert('Кулдаун 1 минута между заказами\n(Это защита от спама и ботов)');
            }

            orders.push(now);
            localStorage.setItem('orders', JSON.stringify(orders));
            localStorage.setItem('lastOrder', now);

            const itemsText = cart.map(item => `• ${item.name} ×${item.qty}`).join('\n');
            const totalAries = cart.reduce((sum, item) => sum + item.price * item.qty, 0);

            const webhookUrl = 'https://discord.com/api/webhooks/1484810417090990130/YA4PHS-SvKAgh8RcZtyR0fbCYtNVqTTPyrz0Z-4r35hJY9YdycImhKXM_49UE3LzaRDo';

            const embed = {
                title: "🛒 НОВЫЙ ЗАКАЗ — JokyPrice",
                description: `**Ник:** ${nick}\n**Заказ:**\n${itemsText}`,
                color: 0x005BFF,
                fields: [
                    { name: "🚀 Доставка", value: delivery, inline: true },
                    { name: "💰 Выплата", value: payout, inline: true },
                    { name: "💎 Итого", value: `${totalAries} ₽`, inline: true },
                    { name: "💬 Комментарий", value: comment || "—", inline: false },
                    { name: "Действия", value: "✅ — Взять заказ\n❌ — Отменить заказ", inline: false }
                ]
            };

            const formData = new FormData();
            formData.append('payload_json', JSON.stringify({
                content: `**@here** Новый заказ от **${nick}**!`,
                embeds: [embed]
            }));
            formData.append('file', file, 'скриншот_аров.png');

            const res = await fetch(webhookUrl, { method: 'POST', body: formData });
            if (res.ok) {
                alert('✅ ЗАКАЗ ОТПРАВЛЕН!');
                cart = []; renderCart(); closeModal(); document.getElementById('order-form').reset();
            } else alert('Ошибка отправки.');
        }

        function adminPanel() {
            const pass = prompt('Введите пароль:');
            if (pass === 'jokyadmin123') {
                if (confirm('Разбанить пользователя?')) {
                    localStorage.removeItem('banned');
                    localStorage.removeItem('orders');
                    localStorage.removeItem('lastOrder');
                    alert('Пользователь разбанен!');
                }
            } else alert('Неверный пароль!');
        }
    </script>
</body>
</html>
