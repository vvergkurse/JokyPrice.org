<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JokyPrice — Minecraft Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="jokyprice.css">
</head>
<body>
    <!-- КНОПКА ГЛАВНОЙ СТРАНИЦЫ -->
    <div class="top-header">
        <button onclick="window.location.href='index.html'" class="home-btn">🏠 JokyPrice</button>
    </div>

    <div class="hero">
        <div class="hero-badge animate-pulse">
            <div class="hero-badge-dot"></div>
            Пока не работает • Сервис доставки товара по серверу Sakeva
        </div>
        <p style="font-size:20px; color:#94a3b8; margin-top: 20px; animation: slideUp 1s ease-out;">Плати Арами → Получай вещи</p>
    </div>

    <div class="product-page-container">
        <div>
            <!-- ОСНОВНОЕ СОДЕРЖИМОЕ ТОВАРА -->
            <div class="product-detail" id="product-detail">
                <!-- Сюда будет загружен товар -->
            </div>
        </div>

        <div id="cart">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
                <h3 style="font-size:24px; font-weight:600;">🛒 Корзина <span id="cart-count" style="background:#00ff9d; color:#000; font-size:13px; padding:4px 14px; border-radius:9999px;">0</span></h3>
                <button onclick="clearCart()" style="color:#f87171; background:none; border:none; cursor:pointer; font-size:16px;">Очистить</button>
            </div>
            <div id="cart-list"></div>
            <div style="border-top:1px solid rgba(255,255,255,0.1); padding-top:24px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:16px;">
                    <span style="color:#94a3b8;">Итого</span>
                    <span id="total-price" style="font-size:32px; font-weight:700; color:#00ff9d;">0 АРЫ</span>
                </div>
                <button onclick="openModal()" class="order-btn">ОФОРМИТЬ ЗАКАЗ</button>
            </div>
        </div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; margin-bottom:24px;">
                <h3 style="font-size:24px;">Оформление заказа</h3>
                <button onclick="closeModal()" style="font-size:32px; color:#64748b; background:none; border:none; cursor:pointer;">×</button>
            </div>
            <form id="order-form" onsubmit="submitOrder(event)">
                <label>Никнейм в Minecraft</label>
                <input type="text" id="nick" required placeholder="StevePro">
                
                <label style="margin-top:20px;">Скриншот АРОВ (обязательно)</label>
                <input type="file" id="screenshot" accept="image/*" required>
                
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:20px;">
                    <div><label>Координаты доставки</label><input type="text" id="delivery" required placeholder="123 64 -456"></div>
                    <div><label>Мир ферм/Мир построек</label><input type="text" id="payout" required placeholder="мир ферм"></div>
                </div>
                
                <label style="margin-top:20px;">Комментарий (не обязательно)</label>
                <textarea id="comment" rows="3" placeholder="Доставить как можно быстрее..."></textarea>
                
                <button type="submit" class="order-btn" style="margin-top:32px;">ОТПРАВИТЬ ЗАКАЗ В DISCORD</button>
            </form>
        </div>
    </div>

    <footer>
        JokyPrice © 2026 • 
        <button onclick="adminPanel()" style="background:none;border:none;color:#00ff9d;cursor:pointer;">Админ-панель</button>
        • Защита от спама активна
    
        <div style="margin-top:16px; font-size:13px; color:#64748b; opacity:0.85;">
            Вступай в клан: 
            <a href="https://discord.gg/9vEC9RrdSF" 
               target="_blank" 
               style="color:#64748b; text-decoration:underline; font-weight:500;">
                https://discord.gg/9vEC9RrdSF
            </a>
        </div>
    </footer>

    <script>
        // ТОВАРЫ С ОПИСАНИЯМИ
        const products = [
            { 
                id:1, 
                name:"Железные блоки x64", 
                price:1, 
                category:"Строительство", 
                image:"https://ru.minecraft.wiki/images/Железный_блок_JE4_BE3.png?41bce", 
                description:"Отличный материал для строительства. Прочный и красивый блок. Идеально подходит для создания прочных конструкций и декоративных элементов. В наборе 64 блока железа." 
            },
            { 
                id:2, 
                name:"Смолянные блоки x128", 
                price:1, 
                category:"Строительство", 
                image:"https://minecraft.wiki/images/Block_of_Resin_JE1_BE1.png?e9586", 
                description:"Новый блок из смолы. Идеален для декорирования построек и создания уникальных конструкций. Имеет красивый прозрачный вид. В наборе 128 блоков смолы." 
            },
            { 
                id:3, 
                name:"Проворство III", 
                price:24, 
                category:"Зачарования", 
                image:"https://minecraft.wiki/images/Netherite_Boots_%28item%29_BE1.png?b8363&format=original", 
                description:"Мощное зачарование для быстрого передвижения и боевых действий. Уровень III дает максимальное увеличение скорости. Идеально для PvP боев и быстрого передвижения." 
            },
            { 
                id:4, 
                name:"Книга", 
                price:2, 
                category:"Ресурсы", 
                image:"https://minecraft.wiki/images/Book_JE2_BE2.png?caac6", 
                description:"Обычная книга для описания и украшения. Может быть использована для создания зачарованных книг и других рецептов. Полезный ресурс для любого строителя." 
            },
            { 
                id:5, 
                name:"Пластинка", 
                price:1, 
                category:"Ресурсы", 
                image:"https://minecraft.wiki/images/thumb/Music_Disc_13_JE1_BE1.png/64px-Music_Disc_13_JE1_BE1.png?3ad74", 
                description:"Музыкальный диск для проигрывателя. Создает атмосферу в вашем доме или базе! Высокое качество звука, идеально для вечеринок." 
            },
            { 
                id:6, 
                name:"Кожа", 
                price:1, 
                category:"Ресурсы", 
                image:"https://minecraft.wiki/images/Leather_JE2_BE2.png?10fae", 
                description:"Ценный ресурс для крафта брони и других предметов. Используется для создания кожаной брони и седел. Легко добыть или купить у нас!" 
            },
            { 
                id:7, 
                name:"Факел Душ", 
                price:3, 
                category:"Ресурсы", 
                image:"https://minecraft.wiki/images/Soul_Torch.gif?49a46", 
                description:"Редкий декоративный элемент с фиолетовым свечением. Создает уникальную атмосферу в любом помещении. Идеален для украшения баз и домов." 
            },
            { 
                id:8, 
                name:"Незерит", 
                price:20, 
                category:"Ресурсы", 
                image:"https://minecraft.wiki/images/Netherite_Ingot_JE1_BE2.png?79364", 
                description:"Самый ценный ресурс в игре. Используется для создания лучшей брони и инструментов. Редкий и дорогой материал, который стоит каждой копейки!" 
            }
        ];

        let cart = [];
        let currentProductIndex = null;

        // ЗАГРУЗКА ТОВАРА ИЗ localStorage
        function loadProduct() {
            const productIndex = localStorage.getItem('selectedProduct');
            
            if (productIndex === null || productIndex < 0 || productIndex >= products.length) {
                document.getElementById('product-detail').innerHTML = '<div style="color:#64748b; padding:40px; text-align:center;">Товар не найден 😞</div>';
                return;
            }

            currentProductIndex = productIndex;
            const product = products[productIndex];

            document.title = `${product.name} — JokyPrice`;

            const detailHTML = `
                <div class="product-image-large">
                    <img src="${product.image}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/400x400/111827/00ff9d?text=${encodeURIComponent(product.name)}'">
                </div>
                <div class="product-details">
                    <div style="font-size:14px; color:#00ff9d; margin-bottom:16px; text-transform:uppercase; letter-spacing:1px;">${product.category}</div>
                    <h1 style="margin-bottom:20px; font-size:42px;">${product.name}</h1>
                    
                    <div class="product-description">
                        <p>${product.description}</p>
                    </div>

                    <div style="margin: 32px 0;">
                        <div style="color:#94a3b8; font-size:14px; margin-bottom:8px;">ЦЕНА</div>
                        <div style="font-size:48px; font-weight:700; color:#00ff9d; margin-bottom:8px;">${product.price}</div>
                        <div style="color:#64748b;">АРЫ</div>
                    </div>

                    <div style="background: rgba(0,212,255,0.05); border: 1px solid rgba(0,212,255,0.2); border-radius:16px; padding:20px; margin:24px 0;">
                        <div style="display:flex; align-items:center; gap:16px; margin-bottom:20px;">
                            <span style="color:#94a3b8;">Количество:</span>
                            <div style="display:flex; align-items:center; gap:12px; background:rgba(0,212,255,0.1); border:1px solid rgba(0,212,255,0.2); border-radius:12px; padding:8px;">
                                <button onclick="decreaseQty()" style="width:32px; height:32px; border:none; background:rgba(0,212,255,0.2); border-radius:8px; color:#00ff9d; font-size:18px; cursor:pointer; transition:all 0.3s;" onmouseover="this.style.background='rgba(0,212,255,0.4)'" onmouseout="this.style.background='rgba(0,212,255,0.2)'">−</button>
                                <span id="quantity" style="font-weight:700; font-size:18px; min-width:40px; text-align:center;">1</span>
                                <button onclick="increaseQty()" style="width:32px; height:32px; border:none; background:rgba(0,212,255,0.2); border-radius:8px; color:#00ff9d; font-size:18px; cursor:pointer; transition:all 0.3s;" onmouseover="this.style.background='rgba(0,212,255,0.4)'" onmouseout="this.style.background='rgba(0,212,255,0.2)'">+</button>
                            </div>
                        </div>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span style="color:#94a3b8;">Сумма:</span>
                            <span style="font-size:24px; font-weight:700; color:#00ff9d;" id="sum-price">${product.price} АРЫ</span>
                        </div>
                    </div>

                    <button onclick="addCurrentToCart()" class="order-btn" style="width:100%; padding:20px; font-size:18px; margin-bottom:12px;">ДОБАВИТЬ В КОРЗИНУ</button>
                    <button onclick="window.location.href='index.html'" style="width:100%; padding:20px; background:rgba(0,212,255,0.1); border:2px solid rgba(0,212,255,0.2); border-radius:12px; color:#e0f2ff; font-weight:600; font-size:16px; cursor:pointer; transition:all 0.3s;" onmouseover="this.style.background='rgba(0,212,255,0.2)'" onmouseout="this.style.background='rgba(0,212,255,0.1)'">← ВЕРНУТЬСЯ В КАТАЛОГ</button>
                </div>
            `;

            document.getElementById('product-detail').innerHTML = detailHTML;
        }

        let currentQty = 1;

        function increaseQty() {
            currentQty++;
            updateQtyDisplay();
        }

        function decreaseQty() {
            if (currentQty > 1) {
                currentQty--;
                updateQtyDisplay();
            }
        }

        function updateQtyDisplay() {
            document.getElementById('quantity').textContent = currentQty;
            const product = products[currentProductIndex];
            document.getElementById('sum-price').textContent = (product.price * currentQty) + ' АРЫ';
        }

        function addCurrentToCart() {
            const product = products[currentProductIndex];
            const existing = cart.find(item => item.id === product.id);
            
            if (existing) {
                existing.qty += currentQty;
            } else {
                cart.push({...product, qty: currentQty});
            }
            
            renderCart();
            
            // Анимация добавления
            const cartEl = document.getElementById('cart');
            cartEl.style.borderColor = '#00ff9d';
            cartEl.style.transform = 'scale(1.02)';
            setTimeout(() => {
                cartEl.style.borderColor = 'rgba(255,255,255,0.1)';
                cartEl.style.transform = 'scale(1)';
            }, 300);
            
            // Сброс количества
            currentQty = 1;
            updateQtyDisplay();
            
            alert('✅ Товар добавлен в корзину!');
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            const totalEl = document.getElementById('total-price');
            const countEl = document.getElementById('cart-count');
            list.innerHTML = '';
            let total = 0;
            
            cart.forEach((item, i) => {
                const itemTotal = item.price * item.qty;
                total += itemTotal;
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `
                    <div>
                        <div style="font-weight:500;">${item.name}</div>
                        <div style="font-size:13px; color:#64748b;">×${item.qty}</div>
                    </div>
                    <div style="text-align:right;">
                        <div style="font-family:monospace; color:#00ff9d; font-weight:600;">${itemTotal} АРЫ</div>
                        <button onclick="removeFromCart(${i})" style="color:#f87171; background:none; border:none; font-size:22px; cursor:pointer;">×</button>
                    </div>
                `;
                list.appendChild(div);
            });
            
            totalEl.textContent = total + ' АРЫ';
            countEl.textContent = cart.length;
        }

        function removeFromCart(i) { 
            cart.splice(i, 1); 
            renderCart(); 
        }

        function clearCart() { 
            if (confirm('Очистить корзину?')) { 
                cart = []; 
                renderCart(); 
            } 
        }

        function openModal() { 
            if (cart.length === 0) return alert('Корзина пуста!'); 
            document.getElementById('modal').style.display = 'flex'; 
        }

        function closeModal() { 
            document.getElementById('modal').style.display = 'none'; 
        }

        async function submitOrder(e) {
            e.preventDefault();

            const nick = document.getElementById('nick').value.trim();
            const delivery = document.getElementById('delivery').value.trim();
            const payout = document.getElementById('payout').value.trim();
            const comment = document.getElementById('comment').value.trim();
            const file = document.getElementById('screenshot').files[0];

            if (nick.length < 4) return alert('Ник должен быть минимум 4 символа!');
            if (!delivery || !payout) return alert('Укажите координаты доставки и выплаты!');
            if (!/^-?\d+\s+-?\d+\s+-?\d+$/.test(delivery) || !/^-?\d+\s+-?\d+\s+-?\d+$/.test(payout)) {
                return alert('Координаты должны состоять из 3 чисел через пробел (можно отрицательные)!');
            }
            if (!file) return alert('Прикрепи скриншот АРОВ!');

            const now = Date.now();
            if (localStorage.getItem('banned') === 'true') return alert('Ваш IP заблокирован за спам.');

            let orders = JSON.parse(localStorage.getItem('orders') || '[]');
            orders = orders.filter(t => now - t < 600000);
            if (orders.length >= 5) {
                localStorage.setItem('banned', 'true');
                return alert('Вы сделали 5 заказов за 10 минут.\nВаш IP заблокирован (защита от спама и ботов).');
            }

            if (localStorage.getItem('lastOrder') && now - localStorage.getItem('lastOrder') < 60000) {
                return alert('Кулдаун 1 минута между заказами\n(Это защита от спама и ботов)');
            }

            orders.push(now);
            localStorage.setItem('orders', JSON.stringify(orders));
            localStorage.setItem('lastOrder', now);

            const itemsText = cart.map(item => `• ${item.name} ×${item.qty}`).join('\n');
            const totalAries = cart.reduce((sum, item) => sum + item.price * item.qty, 0);

            const webhookUrl = 'https://discord.com/api/webhooks/1484810417090990130/YA4PHS-SvKAgh8RcZtyR0fbCYtNVqTTPyrz0Z-4r35hJY9YdycImhKXM_49UE3LzaRDo';

            const embed = {
                title: "🛒 НОВЫЙ ЗАКАЗ — JokyPrice",
                description: `**Ник:** ${nick}\n**Заказ:**\n${itemsText}`,
                color: 0x00ff9d,
                fields: [
                    { name: "🚀 Доставка", value: delivery, inline: true },
                    { name: "💰 Выплата", value: payout, inline: true },
                    { name: "💎 Итого", value: `${totalAries} АРЫ`, inline: true },
                    { name: "💬 Комментарий", value: comment || "—", inline: false },
                    { name: "Действия", value: "✅ — Взять заказ\n❌ — Отменить заказ", inline: false }
                ]
            };

            const formData = new FormData();
            formData.append('payload_json', JSON.stringify({
                content: `**@here** Новый заказ от **${nick}**!`,
                embeds: [embed]
            }));
            formData.append('file', file, 'скриншот_аров.png');

            const res = await fetch(webhookUrl, { method: 'POST', body: formData });
            if (res.ok) {
                alert('✅ ЗАКАЗ ОТПРАВЛЕН!');
                cart = []; renderCart(); closeModal(); document.getElementById('order-form').reset();
            } else alert('Ошибка отправки.');
        }

        function adminPanel() {
            const pass = prompt('Введите пароль:');
            if (pass === 'jokyadmin123') {
                if (confirm('Разбанить пользователя?')) {
                    localStorage.removeItem('banned');
                    localStorage.removeItem('orders');
                    localStorage.removeItem('lastOrder');
                    alert('Пользователь разбанен!');
                }
            } else alert('Неверный пароль!');
        }

        // ЗАГРУЗКА ПРИ ОТКРЫТИИ СТРАНИЦЫ
        document.addEventListener('DOMContentLoaded', function() {
            loadProduct();
            renderCart();
        });
    </script>
</body>
</html>
